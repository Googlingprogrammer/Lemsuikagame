<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lém Toen Drop - Suika Game Clone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #C8956C;
      touch-action: none;
    }
    main {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <main id="game-container"></main>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.4/lib/p5.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/planck@1.0.0/dist/planck.min.js"></script>
  <script src="https://p5play.org/v3/p5play.js"></script>

  <!-- Configuration Files -->
  <script src="game-config.js"></script>
  <script src="sound-config.js"></script>
  <script src="ui-config.js"></script>
  <script src="leaderboard-config.js"></script>
  <script src="rewards-config.js"></script>

  <script>
// ============================================================================
// FRUIT DROP - A Suika Game Clone
// ============================================================================
// Configuration is loaded from fruit-config.js
// Edit that file to customize fruits, images, and game settings!
// ============================================================================

// Fruit images loaded from config
let fruitImages = {};

// Sound effects loaded from config (using Web Audio API)
let gameSounds = {};
let soundEnabled = false;
let globalVolume = 0.5;
let audioContext = null;

// Background music
let bgm = null;
let bgmStarted = false;

// Master mute (controls all audio)
let allMuted = false;

// Background image (loaded from UI config)
let backgroundImage = null;

// Floating score texts (for score pop-up effect)
let floatingTexts = [];

// Fireworks particles (for watermelon merge celebration)
let fireworkParticles = [];

// Floating reward images (for watermelon merge)
let floatingRewards = [];
let rewardImages = []; // Loaded from images/rewards folder

// Reference to fruits array from config (initialized in setup)
let FRUITS = [];

// Drop weights calculated from config (only fruits with spawnRate > 0)
let DROP_WEIGHTS = [];
let DROPPABLE_INDICES = []; // Indices of fruits that can be dropped

// ============================================================================
// DEBUG
// ============================================================================
const bDebug = false; // Set to false to disable debug overlay

// ============================================================================
// GAME CONSTANTS
// ============================================================================
const WALL_THICKNESS = 15;

// These are loaded from config in setup(), with fallback defaults
let DANGER_LINE_Y = 120;
let DROP_COOLDOWN = 800;
let DANGER_TIME = 3000;
let WARNING_TIME = 1000;
let GRAVITY = 20;
let FRUIT_BOUNCINESS = 0.2;
let FRUIT_FRICTION = 0.5;
let FRUIT_SCALE = 1.0;

// ============================================================================
// GAME STATE
// ============================================================================
let gameState = 'menu'; // 'menu' | 'playing' | 'win' | 'lose'
let gameMode = 'normal'; // 'normal' | 'endless'

let score = 0;
let highScore = 0;

let fruits = []; // Array of fruit sprites
let currentFruitIndex = 0; // Index of fruit about to be dropped
let nextFruitIndex = 0; // Index of fruit coming after current
let previewX = 0; // X position of preview fruit
let canDrop = true;
let lastDropTime = 0;

let dangerTimer = 0; // Time fruits have been above danger line
let dangerActive = false;

// Canvas and game area dimensions
let canvasWidth, canvasHeight;
let gameAreaLeft, gameAreaRight, gameAreaBottom, gameAreaTop;
let gameAreaWidth;

// Merge queue to handle physics callbacks safely
let mergeQueue = [];

// Group for all fruit sprites (needed for collision detection)
let fruitsGroup;

// Wall sprites
let walls = [];

// ============================================================================
// LEADERBOARD STATE
// ============================================================================
let leaderboardData = [];           // Cached leaderboard entries
let leaderboardLoading = false;     // Loading state
let leaderboardError = null;        // Error message if any

// Name input state (for score submission)
let playerNameInput = '';           // Current input (max 3 chars)
let showNameInput = false;          // Show name input overlay
let nameInputCallback = null;       // Callback after name entered
let scoreToSubmit = 0;              // Score being submitted
let submitting = false;             // Submission in progress

// Leaderboard view state
let showLeaderboard = false;        // Show leaderboard screen
let leaderboardScrollOffset = 0;    // For scrolling long lists

// ============================================================================
// P5.JS FUNCTIONS
// ============================================================================

function preload() {
  // Load fruit images from config
  // Load fruit images with fallback to color circles if loading fails
  // Note: p5play wraps loadImage and may call error callback with the image on success
  if (typeof GAME_CONFIG !== 'undefined' && GAME_CONFIG.fruits) {
    for (let fruit of GAME_CONFIG.fruits) {
      // Initialize to null (fallback to color circle)
      fruitImages[fruit.name] = null;

      if (fruit.image) {
        try {
          console.log('Loading image for:', fruit.name);
          let loadedImg = loadImage(
            fruit.image,
            (img) => {
              console.log('Image loaded:', fruit.name, img.width + 'x' + img.height);
              fruitImages[fruit.name] = img;
            },
            (errOrImg) => {
              // p5play bug workaround: check if "error" is actually a loaded image
              if (errOrImg && errOrImg.width && errOrImg.height) {
                console.log('Image loaded (via p5play):', fruit.name, errOrImg.width + 'x' + errOrImg.height);
                fruitImages[fruit.name] = errOrImg;
              } else {
                console.warn('Failed to load image for:', fruit.name, '- using color fallback');
                fruitImages[fruit.name] = null;
              }
            }
          );
        } catch (e) {
          console.warn('Error loading image for:', fruit.name, e, '- using color fallback');
          fruitImages[fruit.name] = null;
        }
      }
    }
  }

  // Load sound config (actual audio loading happens in setup for Web Audio API)
  if (typeof SOUND_CONFIG !== 'undefined') {
    soundEnabled = SOUND_CONFIG.enabled !== false;
    globalVolume = SOUND_CONFIG.volume !== undefined ? SOUND_CONFIG.volume : 0.5;
  }


  // Load background image from UI config with fallback to color
  // Note: p5play wraps loadImage and may call error callback with the image on success
  if (typeof UI_CONFIG !== 'undefined' && UI_CONFIG.background && UI_CONFIG.background.image) {
    try {
      backgroundImage = loadImage(
        UI_CONFIG.background.image,
        (img) => {
          console.log('Background image loaded:', img.width + 'x' + img.height);
          backgroundImage = img;
        },
        (errOrImg) => {
          // p5play bug workaround: check if "error" is actually a loaded image
          if (errOrImg && errOrImg.width && errOrImg.height) {
            console.log('Background image loaded (via p5play):', errOrImg.width + 'x' + errOrImg.height);
            backgroundImage = errOrImg;
          } else {
            console.warn('Failed to load background image - using color fallback');
            backgroundImage = null;
          }
        }
      );
    } catch (e) {
      console.warn('Error loading background image:', e, '- using color fallback');
      backgroundImage = null;
    }
  }

  // Load reward images for watermelon merge celebration
  let rewardImageFiles = (typeof REWARDS_CONFIG !== 'undefined' && REWARDS_CONFIG.images)
    ? REWARDS_CONFIG.images
    : [];

  for (let rewardFile of rewardImageFiles) {
    try {
      let img = loadImage(
        rewardFile,
        (loadedImg) => {
          console.log('Reward image loaded:', rewardFile);
          rewardImages.push(loadedImg);
        },
        (errOrImg) => {
          if (errOrImg && errOrImg.width && errOrImg.height) {
            console.log('Reward image loaded (via p5play):', rewardFile);
            rewardImages.push(errOrImg);
          }
          // Silently ignore missing reward images
        }
      );
    } catch (e) {
      // Silently ignore missing reward images
    }
  }
}

function setup() {
  // Load configuration
  loadConfig();

  // Sync CSS background with UI config
  if (typeof UI_CONFIG !== 'undefined' && UI_CONFIG.background) {
    document.body.style.background = UI_CONFIG.background.color;
  }

  // Initialize audio context and load sounds
  initAudio();

  // Calculate responsive canvas size
  calculateCanvasSize();

  // Create canvas using p5play's Canvas (compatible with p5play sprites)
  new Canvas(canvasWidth, canvasHeight);

  // Move canvas to our container
  let canvasEl = document.querySelector('canvas');
  let container = document.getElementById('game-container');
  if (canvasEl && container) {
    container.appendChild(canvasEl);
  }

  // Set cute font
  textFont('Nunito');

  // Set up p5play world
  world.gravity.y = GRAVITY;

  // Disable p5play's automatic sprite drawing (we draw manually)
  allSprites.autoDraw = false;
  allSprites.autoUpdate = true;

  // Create fruits group for collision detection
  fruitsGroup = new Group();

  // Load high score from localStorage
  loadHighScore();

  // Initialize preview position
  previewX = canvasWidth / 2;

  // Pick first two fruits
  currentFruitIndex = pickRandomDropFruit();
  nextFruitIndex = pickRandomDropFruit();
}

function loadConfig() {
  // Load fruits from config
  if (typeof GAME_CONFIG !== 'undefined' && GAME_CONFIG.fruits) {
    FRUITS = GAME_CONFIG.fruits;

    // Build drop weights and droppable indices from spawnRate
    DROP_WEIGHTS = [];
    DROPPABLE_INDICES = [];
    for (let i = 0; i < FRUITS.length; i++) {
      if (FRUITS[i].spawnRate > 0) {
        DROP_WEIGHTS.push(FRUITS[i].spawnRate);
        DROPPABLE_INDICES.push(i);
      }
    }

    // Load game settings
    if (GAME_CONFIG.dropCooldown) DROP_COOLDOWN = GAME_CONFIG.dropCooldown;
    if (GAME_CONFIG.dangerLineY) DANGER_LINE_Y = GAME_CONFIG.dangerLineY;
    if (GAME_CONFIG.dangerTime) DANGER_TIME = GAME_CONFIG.dangerTime;
    if (GAME_CONFIG.warningTime) WARNING_TIME = GAME_CONFIG.warningTime;
    if (GAME_CONFIG.gravity) GRAVITY = GAME_CONFIG.gravity;
    if (GAME_CONFIG.bounciness) FRUIT_BOUNCINESS = GAME_CONFIG.bounciness;
    if (GAME_CONFIG.friction) FRUIT_FRICTION = GAME_CONFIG.friction;
    // Note: FRUIT_SCALE is calculated in calculateCanvasSize() using GAME_CONFIG.fruitScale as base
    if (GAME_CONFIG.comboInterval) COMBO_INTERVAL = GAME_CONFIG.comboInterval;
    if (GAME_CONFIG.comboBonusCap) COMBO_BONUS_CAP = GAME_CONFIG.comboBonusCap;
  } else {
    // Fallback to defaults if config not loaded
    console.warn('GAME_CONFIG not found, using defaults');
    FRUITS = [
      { name: 'cherry', displayName: 'Cherry', radius: 20, color: '#e74c3c', score: 1, spawnRate: 50 },
      { name: 'strawberry', displayName: 'Strawberry', radius: 30, color: '#e91e63', score: 3, spawnRate: 35 },
      { name: 'grape', displayName: 'Grape', radius: 40, color: '#9b59b6', score: 6, spawnRate: 15 },
      { name: 'orange', displayName: 'Orange', radius: 55, color: '#f39c12', score: 10, spawnRate: 0 },
      { name: 'apple', displayName: 'Apple', radius: 65, color: '#27ae60', score: 15, spawnRate: 0 },
      { name: 'pear', displayName: 'Pear', radius: 75, color: '#f1c40f', score: 21, spawnRate: 0 },
      { name: 'watermelon', displayName: 'Watermelon', radius: 90, color: '#2ecc71', score: 28, spawnRate: 0 }
    ];
    DROP_WEIGHTS = [50, 35, 15];
    DROPPABLE_INDICES = [0, 1, 2];
  }
}

function drawBackground() {
  // Always draw fallback color first
  background(UI_CONFIG.background.color);

  // If background image is loaded, draw it on top
  if (backgroundImage) {
    let mode = UI_CONFIG.background.imageMode || 'cover';
    let imgW = backgroundImage.width;
    let imgH = backgroundImage.height;

    push();
    imageMode(CORNER);

    switch (mode) {
      case 'cover':
        // Scale to cover entire canvas, may crop
        let coverScale = Math.max(canvasWidth / imgW, canvasHeight / imgH);
        let coverW = imgW * coverScale;
        let coverH = imgH * coverScale;
        let coverX = (canvasWidth - coverW) / 2;
        let coverY = (canvasHeight - coverH) / 2;
        image(backgroundImage, coverX, coverY, coverW, coverH);
        break;

      case 'contain':
        // Scale to fit inside canvas, may have letterboxing
        let containScale = Math.min(canvasWidth / imgW, canvasHeight / imgH);
        let containW = imgW * containScale;
        let containH = imgH * containScale;
        let containX = (canvasWidth - containW) / 2;
        let containY = (canvasHeight - containH) / 2;
        image(backgroundImage, containX, containY, containW, containH);
        break;

      case 'stretch':
        // Stretch to fill canvas exactly
        image(backgroundImage, 0, 0, canvasWidth, canvasHeight);
        break;

      case 'tile':
        // Tile the image across the canvas
        for (let ty = 0; ty < canvasHeight; ty += imgH) {
          for (let tx = 0; tx < canvasWidth; tx += imgW) {
            image(backgroundImage, tx, ty);
          }
        }
        break;

      default:
        // Default to cover
        let defScale = Math.max(canvasWidth / imgW, canvasHeight / imgH);
        let defW = imgW * defScale;
        let defH = imgH * defScale;
        let defX = (canvasWidth - defW) / 2;
        let defY = (canvasHeight - defH) / 2;
        image(backgroundImage, defX, defY, defW, defH);
    }

    pop();
  }
}

function draw() {
  // Draw background (image or fallback color)
  drawBackground();

  switch (gameState) {
    case 'menu':
      drawMenu();
      break;
    case 'playing':
      updateGame();
      drawGame();
      break;
    case 'win':
      drawGame();
      drawWinScreen();
      break;
    case 'lose':
      drawGame();
      drawLoseScreen();
      break;
  }

  // Debug overlay
  if (bDebug) {
    drawDebug();
  }

  // Draw mute button (always visible except during overlays)
  if (!showLeaderboard && !showNameInput) {
    drawMuteButton();
  }

  // Leaderboard overlays (drawn on top of everything)
  drawLeaderboardScreen();
  drawNameInputOverlay();
}

function drawDebug() {
  push();

  // Semi-transparent background for debug panel
  fill(UI_CONFIG.debug.backgroundColor);
  noStroke();
  rect(5, canvasHeight - 95, 160, 90, 5);

  // Debug text
  fill(UI_CONFIG.debug.textColor);
  textAlign(LEFT, TOP);
  textSize(11);

  let y = canvasHeight - 90;
  let lineHeight = 14;

  text('DEBUG', 10, y);
  y += lineHeight;
  text('Canvas: ' + canvasWidth + ' x ' + canvasHeight, 10, y);
  y += lineHeight;
  text('Play area: ' + gameAreaWidth + ' x ' + (gameAreaBottom - gameAreaTop), 10, y);
  y += lineHeight;
  text('Window: ' + windowWidth + ' x ' + windowHeight, 10, y);
  y += lineHeight;
  text('Fruits: ' + fruits.length, 10, y);
  y += lineHeight;
  let configScale = (typeof GAME_CONFIG !== 'undefined' && GAME_CONFIG.fruitScale) ? GAME_CONFIG.fruitScale : 1.0;
  text('Scale: ' + FRUIT_SCALE.toFixed(2) + ' (cfg:' + configScale + ')', 10, y);

  pop();
}

// ============================================================================
// CANVAS SIZING
// ============================================================================

// Reference width for fruit scaling (fruits are designed for this width)
const REFERENCE_WIDTH = 280;

function calculateCanvasSize() {
  // Fit to window while maintaining fixed aspect ratio for consistent gameplay
  let maxWidth = windowWidth;
  let maxHeight = windowHeight;

  // Fixed aspect ratio for consistent experience on all devices
  let targetRatio = 0.5; // width / height

  if (maxWidth / maxHeight > targetRatio) {
    // Window is wider than target - use height as constraint
    canvasHeight = maxHeight;
    canvasWidth = Math.floor(canvasHeight * targetRatio);
  } else {
    // Window is taller than target - use width as constraint
    canvasWidth = maxWidth;
    canvasHeight = Math.floor(canvasWidth / targetRatio);
  }

  // Ensure minimum size
  canvasWidth = Math.max(canvasWidth, 280);
  canvasHeight = Math.max(canvasHeight, 560);

  // Calculate game area bounds (full width, no side panels)
  gameAreaLeft = WALL_THICKNESS;
  gameAreaRight = canvasWidth - WALL_THICKNESS;
  gameAreaTop = DANGER_LINE_Y;
  gameAreaBottom = canvasHeight - WALL_THICKNESS;
  gameAreaWidth = gameAreaRight - gameAreaLeft;

  // Calculate responsive fruit scale based on play area width
  // This ensures fruit-to-playspace ratio stays consistent across devices
  let baseScale = (typeof GAME_CONFIG !== 'undefined' && GAME_CONFIG.fruitScale !== undefined) ? GAME_CONFIG.fruitScale : 1.0;
  let responsiveScale = gameAreaWidth / (REFERENCE_WIDTH - WALL_THICKNESS * 2);
  FRUIT_SCALE = baseScale * responsiveScale;
}

function windowResized() {
  calculateCanvasSize();
  resizeCanvas(canvasWidth, canvasHeight);
  if (previewX) {
    previewX = constrain(previewX, gameAreaLeft + 50, gameAreaRight - 50);
  }
}

// ============================================================================
// MENU
// ============================================================================

function drawMenu() {
  // Draw cream colored menu box
  fill(UI_CONFIG.menu.panelColor);
  noStroke();
  rect(20, canvasHeight * 0.15, canvasWidth - 40, canvasHeight * 0.75, 15);

  // Title (auto-scale to fit)
  fill(UI_CONFIG.menu.titleColor);
  textAlign(CENTER, CENTER);
  let titleText = 'Suika của Lém & Friends';
  let maxTitleWidth = canvasWidth - 60;
  let titleSize = 48;
  textSize(titleSize);
  while (textWidth(titleText) > maxTitleWidth && titleSize > 16) {
    titleSize -= 2;
    textSize(titleSize);
  }
  text(titleText, canvasWidth / 2, canvasHeight * 0.28);

  // Watermelon emoji
  textSize(80);
  text('\u{1F349}', canvasWidth / 2, canvasHeight * 0.43);

  // High score
  textSize(20);
  fill(UI_CONFIG.menu.highScoreColor);
  text('High Score: ' + highScore, canvasWidth / 2, canvasHeight * 0.58);

  // Play button
  let btnX = canvasWidth / 2;
  let btnY = canvasHeight * 0.68;
  let btnW = 160;
  let btnH = 50;

  let isHover = isMouseInRect(btnX - btnW/2, btnY - btnH/2, btnW, btnH);

  fill(isHover ? UI_CONFIG.menu.button.hover : UI_CONFIG.menu.button.normal);
  noStroke();
  rect(btnX - btnW/2, btnY - btnH/2, btnW, btnH, 10);

  fill(UI_CONFIG.menu.button.textColor);
  textSize(24);
  text('Play', btnX, btnY);

  // Leaderboard button (smaller, below play)
  let lbBtnY = canvasHeight * 0.77;
  let lbBtnW = 130;
  let lbBtnH = 35;

  let lbHover = isMouseInRect(btnX - lbBtnW/2, lbBtnY - lbBtnH/2, lbBtnW, lbBtnH);
  fill(lbHover ? '#1976D2' : '#2196F3');
  noStroke();
  rect(btnX - lbBtnW/2, lbBtnY - lbBtnH/2, lbBtnW, lbBtnH, 8);

  fill('#FFFFFF');
  textSize(14);
  text('Leaderboard', btnX, lbBtnY);

  // Instructions
  textSize(12);
  fill(UI_CONFIG.menu.instructionColor);
  text('Tap to drop fruits', canvasWidth / 2, canvasHeight * 0.85);
}

// ============================================================================
// GAME LOGIC
// ============================================================================

function startGame(mode) {
  gameMode = mode;
  gameState = 'playing';
  score = 0;
  dangerTimer = 0;
  dangerActive = false;
  canDrop = true;
  lastDropTime = 0;

  // Clear existing fruits and floating texts
  clearAllFruits();
  floatingTexts = [];
  fireworkParticles = [];
  floatingRewards = [];
  activeCombo = null;
  comboMeter.active = false;
  comboMeter.comboCount = 0;
  comboMeter.totalBonus = 0;

  // Create walls
  createWalls();

  // Pick first two fruits
  currentFruitIndex = pickRandomDropFruit();
  nextFruitIndex = pickRandomDropFruit();
  previewX = canvasWidth / 2;
}

function continueToEndless() {
  // Preserve current board state, just change mode
  gameMode = 'endless';
  gameState = 'playing';
  dangerTimer = 0;
  dangerActive = false;
  canDrop = true;
  // Score and fruits remain as-is
}

function updateGame() {
  // Process merge queue (from physics callbacks)
  processMergeQueue();

  // Update drop cooldown
  if (!canDrop && millis() - lastDropTime > DROP_COOLDOWN) {
    canDrop = true;
  }

  // Check danger zone
  checkDangerZone();

  // Update floating score texts
  updateFloatingTexts();

  // Update celebration effects
  updateFireworks();
  updateFloatingRewards();

  // Clean up any fruits that fell off screen (shouldn't happen, but safety)
  cleanupFruits();
}

function checkDangerZone() {
  // Check if any fruit is above danger line
  let fruitAboveLine = false;

  for (let fruit of fruits) {
    let radius = fruit.fruitRadius || FRUITS[fruit.fruitIndex].radius;
    if (fruit && fruit.y - radius < DANGER_LINE_Y) {
      // Only count settled fruits (not recently dropped)
      if (fruit.age && millis() - fruit.age > 500) {
        fruitAboveLine = true;
        break;
      }
    }
  }

  if (fruitAboveLine) {
    if (!dangerActive) {
      dangerActive = true;
      dangerTimer = millis();
    } else {
      let elapsed = millis() - dangerTimer;
      if (elapsed >= DANGER_TIME) {
        gameOver();
      }
    }
  } else {
    dangerActive = false;
    dangerTimer = 0;
  }
}

function gameOver() {
  gameState = 'lose';
  updateHighScore();
  playSound('gameOver');
}

function winGame() {
  gameState = 'win';
  updateHighScore();
  playSound('victory');
}

// ============================================================================
// FRUIT MANAGEMENT
// ============================================================================

function pickRandomDropFruit() {
  // Weighted random selection from droppable fruits only
  if (DROP_WEIGHTS.length === 0 || DROPPABLE_INDICES.length === 0) {
    return 0; // Fallback to first fruit
  }

  let totalWeight = DROP_WEIGHTS.reduce((a, b) => a + b, 0);
  let rand = random(totalWeight);
  let cumulative = 0;

  for (let i = 0; i < DROP_WEIGHTS.length; i++) {
    cumulative += DROP_WEIGHTS[i];
    if (rand < cumulative) {
      return DROPPABLE_INDICES[i]; // Return actual fruit index
    }
  }
  return DROPPABLE_INDICES[0];
}

function dropFruit() {
  if (!canDrop || gameState !== 'playing') return;

  // Drop the current fruit
  let fruit = createFruitSprite(currentFruitIndex, previewX, DANGER_LINE_Y - 30);
  fruit.age = millis(); // Track when dropped
  fruits.push(fruit);

  // Play spawn sound
  playSound('spawn');

  canDrop = false;
  lastDropTime = millis();

  // Rotate queue: next becomes current, pick new next
  currentFruitIndex = nextFruitIndex;
  nextFruitIndex = pickRandomDropFruit();
}

function createFruitSprite(fruitIndex, x, y) {
  let fruitData = FRUITS[fruitIndex];
  let scaledRadius = fruitData.radius * FRUIT_SCALE;
  let diameter = scaledRadius * 2;

  // Create circle sprite with correct diameter
  let sprite = new Sprite(x, y, diameter);
  sprite.diameter = diameter;
  sprite.collider = 'dynamic';
  sprite.bounciness = FRUIT_BOUNCINESS;
  sprite.friction = FRUIT_FRICTION;
  sprite.rotationLock = false;
  sprite.fruitIndex = fruitIndex;
  sprite.fruitRadius = scaledRadius; // Store scaled radius for our custom drawing
  sprite.markedForMerge = false;

  // Hide p5play's default rendering - we draw manually
  sprite.visible = false;

  // Add to fruits group
  fruitsGroup.add(sprite);

  // Set up collision callback with other fruits
  sprite.collides(fruitsGroup, handleCollision);

  return sprite;
}

function handleCollision(spriteA, spriteB) {
  // Check if both sprites are fruits with same index
  if (spriteA.fruitIndex !== undefined &&
      spriteB.fruitIndex !== undefined &&
      spriteA.fruitIndex === spriteB.fruitIndex &&
      !spriteA.markedForMerge &&
      !spriteB.markedForMerge) {

    // Mark both for merge
    spriteA.markedForMerge = true;
    spriteB.markedForMerge = true;

    // Add to merge queue (process outside physics step)
    mergeQueue.push({
      a: spriteA,
      b: spriteB,
      index: spriteA.fruitIndex
    });
  }
}

function processMergeQueue() {
  while (mergeQueue.length > 0) {
    let merge = mergeQueue.shift();

    // Verify sprites still exist
    if (!merge.a || !merge.b) continue;
    if (!fruits.includes(merge.a) || !fruits.includes(merge.b)) continue;

    // Calculate merge position (average of both fruits)
    let mergeX = (merge.a.x + merge.b.x) / 2;
    let mergeY = (merge.a.y + merge.b.y) / 2;

    // Add score
    let points = FRUITS[merge.index].score;
    score += points;

    // Spawn floating score text (pass fruit score for combo bonus calculation)
    spawnFloatingText('+' + points, mergeX, mergeY, FRUITS[merge.index].color, points);

    // Play merge sound with pitch based on combo (higher pitch for longer combos)
    let comboCount = activeCombo ? activeCombo.comboCount : 1;
    let pitchConfig = SOUND_CONFIG.comboPitch || { initial: 1.0, increasePercent: 10, cap: 1.5 };
    let pitchMultiplier = pitchConfig.initial + (comboCount - 1) * (pitchConfig.increasePercent / 100);
    pitchMultiplier = Math.min(pitchMultiplier, pitchConfig.cap);
    playSound('merge', pitchMultiplier);

    // Remove old fruits
    removeFruit(merge.a);
    removeFruit(merge.b);

    // Create new fruit (if not already max size)
    if (merge.index < FRUITS.length - 1) {
      let newFruit = createFruitSprite(merge.index + 1, mergeX, mergeY);
      newFruit.age = millis();
      fruits.push(newFruit);

      // Trigger celebration when watermelon is created (max fruit)
      if (merge.index + 1 === FRUITS.length - 1) {
        triggerWatermelonCelebration(mergeX, mergeY);
      }
    } else {
      // Merged two watermelons - trigger celebration
      triggerWatermelonCelebration(mergeX, mergeY);

      // Check for win in normal mode
      if (gameMode === 'normal') {
        winGame();
        return;
      }
    }
  }
}

function removeFruit(fruit) {
  let index = fruits.indexOf(fruit);
  if (index > -1) {
    fruits.splice(index, 1);
    fruitsGroup.remove(fruit);
    fruit.remove();
  }
}

// ============================================================================
// FLOATING SCORE TEXT (COMBO SYSTEM)
// ============================================================================

// Combo settings (loaded from config in setup)
let COMBO_INTERVAL = 1000;
let COMBO_BONUS_CAP = 10;

// Active combo text (null if no active combo)
let activeCombo = null;

// Combo meter state
let comboMeter = {
  active: false,
  timeLeft: 0,
  comboCount: 0,
  totalBonus: 0,
  hue: 0  // For gradient animation
};

function calculateComboBonus(comboCount, fruitScore) {
  // Bonus ramps up: +1 for 2nd combo, +2 for 3rd, etc., capped at COMBO_BONUS_CAP
  // First merge = no bonus, second = +1, third = +2, etc.
  if (comboCount <= 1) return 0;
  let bonus = comboCount - 1;
  return Math.min(bonus, COMBO_BONUS_CAP);
}

function spawnFloatingText(text, x, y, color, fruitScore) {
  let points = parseInt(text.replace('+', '')) || 0;
  fruitScore = fruitScore || points;

  // Check if we should add to existing combo
  if (activeCombo && activeCombo.age < COMBO_INTERVAL) {
    // Add to existing combo
    activeCombo.comboCount++;

    // Calculate combo bonus
    let bonus = calculateComboBonus(activeCombo.comboCount, fruitScore);
    activeCombo.totalScore += points + bonus;
    activeCombo.lastBonus = bonus;
    activeCombo.text = '+' + activeCombo.totalScore;

    // Update position to new merge location (weighted average)
    activeCombo.x = (activeCombo.x + x) / 2;
    activeCombo.startY = (activeCombo.startY + y) / 2;

    // Trigger shake effect
    activeCombo.shakeTime = 0;
    activeCombo.shaking = true;

    // Reset age to extend lifetime
    activeCombo.age = 0;

    // Update combo meter
    comboMeter.active = true;
    comboMeter.timeLeft = COMBO_INTERVAL;
    comboMeter.comboCount = activeCombo.comboCount;
    comboMeter.totalBonus += bonus;

    // Add bonus to actual score
    score += bonus;
  } else {
    // Create new combo
    activeCombo = {
      text: '+' + points,
      totalScore: points,
      comboCount: 1,
      lastBonus: 0,
      x: x,
      y: y,
      startY: y,
      color: color || '#FFD700',
      alpha: 255,
      scale: 1,
      age: 0,
      lifetime: COMBO_INTERVAL + 500,  // Combo window + fade out time
      shakeTime: 0,
      shaking: true
    };
    floatingTexts.push(activeCombo);

    // Initialize combo meter
    comboMeter.active = true;
    comboMeter.timeLeft = COMBO_INTERVAL;
    comboMeter.comboCount = 1;
    comboMeter.totalBonus = 0;
  }
}

function updateFloatingTexts() {
  // Update combo meter
  if (comboMeter.active) {
    comboMeter.timeLeft -= deltaTime;
    comboMeter.hue = (comboMeter.hue + deltaTime * 0.2) % 360;  // Animate gradient

    if (comboMeter.timeLeft <= 0) {
      comboMeter.active = false;
      comboMeter.comboCount = 0;
      comboMeter.totalBonus = 0;
    }
  }

  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    let ft = floatingTexts[i];
    ft.age += deltaTime;

    // Update shake animation
    if (ft.shaking) {
      ft.shakeTime += deltaTime;
      let shakeProgress = ft.shakeTime / 200;  // 200ms shake duration

      if (shakeProgress < 1) {
        // Quick scale up and down
        ft.scale = 1 + Math.sin(shakeProgress * Math.PI) * 0.5;
      } else {
        ft.shaking = false;
        ft.scale = 1;
      }
    }

    // Move up slowly
    let floatProgress = Math.min(ft.age / ft.lifetime, 1);
    ft.y = ft.startY - (60 * floatProgress);

    // Start fading after combo window closes
    if (ft.age > COMBO_INTERVAL) {
      let fadeProgress = (ft.age - COMBO_INTERVAL) / 500;
      ft.alpha = 255 * (1 - fadeProgress);
    }

    // Remove if expired
    if (ft.age >= ft.lifetime) {
      floatingTexts.splice(i, 1);
      if (activeCombo === ft) {
        activeCombo = null;
      }
    }
  }
}

function drawFloatingTexts() {
  for (let ft of floatingTexts) {
    push();
    translate(ft.x, ft.y);
    scale(ft.scale);

    // Draw text with outline for visibility
    textAlign(CENTER, CENTER);
    textSize(28);
    textStyle(BOLD);

    // Outline
    fill(0, ft.alpha * 0.5);
    for (let ox = -2; ox <= 2; ox++) {
      for (let oy = -2; oy <= 2; oy++) {
        if (ox !== 0 || oy !== 0) {
          text(ft.text, ox, oy);
        }
      }
    }

    // Main text - brighter yellow for combos
    let r = 255;
    let g = Math.max(180, 255 - ft.comboCount * 20);  // Gets more orange with combos
    let b = Math.max(0, 100 - ft.comboCount * 20);
    fill(r, g, b, ft.alpha);
    text(ft.text, 0, 0);

    // Show combo count if > 1
    if (ft.comboCount > 1) {
      textSize(14);
      fill(255, 255, 255, ft.alpha * 0.9);
      text(ft.comboCount + ' combo!', 0, 24);
    }

    textStyle(NORMAL);
    pop();
  }
}

function drawComboMeter() {
  if (!comboMeter.active || comboMeter.comboCount < 2) return;

  let meterX = WALL_THICKNESS + 10;
  let meterY = 85;
  let meterW = gameAreaWidth - 20;
  let meterH = 20;

  // Background
  fill(0, 100);
  noStroke();
  rect(meterX, meterY, meterW, meterH, 10);

  // Progress bar with gradient
  let progress = comboMeter.timeLeft / COMBO_INTERVAL;
  let barW = meterW * progress;

  if (barW > 0) {
    // Create gradient effect
    drawingContext.save();

    // Clip to rounded rect
    drawingContext.beginPath();
    drawingContext.roundRect(meterX, meterY, barW, meterH, 10);
    drawingContext.clip();

    // Animated gradient
    let gradient = drawingContext.createLinearGradient(meterX, 0, meterX + meterW, 0);
    let hue1 = comboMeter.hue;
    let hue2 = (comboMeter.hue + 60) % 360;
    let hue3 = (comboMeter.hue + 120) % 360;

    gradient.addColorStop(0, 'hsl(' + hue1 + ', 100%, 60%)');
    gradient.addColorStop(0.5, 'hsl(' + hue2 + ', 100%, 60%)');
    gradient.addColorStop(1, 'hsl(' + hue3 + ', 100%, 60%)');

    drawingContext.fillStyle = gradient;
    drawingContext.fillRect(meterX, meterY, barW, meterH);

    drawingContext.restore();
  }

  // Combo text with gradient
  push();
  let comboText = comboMeter.comboCount + 'x COMBO';
  if (comboMeter.totalBonus > 0) {
    comboText += ' +' + comboMeter.totalBonus + ' bonus!';
  }

  textAlign(CENTER, CENTER);
  textSize(12);
  textStyle(BOLD);

  // Create gradient text
  let textX = meterX + meterW / 2;
  let textY = meterY + meterH / 2;

  // Text outline
  fill(0, 150);
  for (let ox = -1; ox <= 1; ox++) {
    for (let oy = -1; oy <= 1; oy++) {
      if (ox !== 0 || oy !== 0) {
        text(comboText, textX + ox, textY + oy);
      }
    }
  }

  // Gradient text using canvas
  drawingContext.save();
  drawingContext.font = 'bold 12px Nunito';
  drawingContext.textAlign = 'center';
  drawingContext.textBaseline = 'middle';

  let textGradient = drawingContext.createLinearGradient(textX - 60, 0, textX + 60, 0);
  let th1 = (comboMeter.hue + 180) % 360;
  let th2 = (comboMeter.hue + 240) % 360;
  let th3 = (comboMeter.hue + 300) % 360;

  textGradient.addColorStop(0, 'hsl(' + th1 + ', 100%, 85%)');
  textGradient.addColorStop(0.5, 'hsl(' + th2 + ', 100%, 85%)');
  textGradient.addColorStop(1, 'hsl(' + th3 + ', 100%, 85%)');

  drawingContext.fillStyle = textGradient;
  drawingContext.fillText(comboText, textX, textY);
  drawingContext.restore();

  textStyle(NORMAL);
  pop();
}

// ============================================================================
// FIREWORKS & REWARD EFFECTS (for watermelon merge)
// ============================================================================

function spawnFireworks(x, y, count = 30) {
  for (let i = 0; i < count; i++) {
    let angle = random(TWO_PI);
    let speed = random(3, 8);
    let particle = {
      x: x,
      y: y,
      vx: cos(angle) * speed,
      vy: sin(angle) * speed - random(2, 5), // Bias upward
      size: random(4, 10),
      color: color(random(255), random(255), random(255)),
      alpha: 255,
      life: random(40, 80),
      maxLife: 80,
      gravity: 0.15
    };
    fireworkParticles.push(particle);
  }
}

function spawnFloatingReward(x, y) {
  if (rewardImages.length === 0) return;

  let cfg = REWARDS_CONFIG || {};
  let img = random(rewardImages);

  // Calculate responsive scale based on screen size
  // Target size is a percentage of game area width
  let targetSize = gameAreaWidth * (cfg.targetSizePercent || 0.3); // 30% of game width by default
  let imgMaxDimension = Math.max(img.width, img.height);
  let responsiveScale = targetSize / imgMaxDimension;

  // Apply config scale as a multiplier
  let finalScale = responsiveScale * (cfg.scaleMultiplier || 1.0);

  let reward = {
    img: img,
    x: x + random(-(cfg.spawnOffsetX || 30), (cfg.spawnOffsetX || 30)),
    y: y,
    vy: -(cfg.floatSpeed || 2),
    alpha: 255,
    scale: finalScale,
    rotation: random(-0.2, 0.2),
    life: cfg.fadeTime || 120
  };
  floatingRewards.push(reward);
}

function updateFireworks() {
  for (let i = fireworkParticles.length - 1; i >= 0; i--) {
    let p = fireworkParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.98; // Air resistance
    p.life--;
    p.alpha = (p.life / p.maxLife) * 255;

    if (p.life <= 0) {
      fireworkParticles.splice(i, 1);
    }
  }
}

function updateFloatingRewards() {
  for (let i = floatingRewards.length - 1; i >= 0; i--) {
    let r = floatingRewards[i];
    r.y += r.vy;
    r.vy -= 0.01; // Slow down upward movement
    r.life--;
    r.alpha = Math.min(255, (r.life / 60) * 255); // Fade in last 60 frames

    if (r.life <= 0) {
      floatingRewards.splice(i, 1);
    }
  }
}

function drawFireworks() {
  noStroke();
  for (let p of fireworkParticles) {
    let c = p.color;
    fill(red(c), green(c), blue(c), p.alpha);
    circle(p.x, p.y, p.size);
  }
}

function drawFloatingRewards() {
  for (let r of floatingRewards) {
    push();
    translate(r.x, r.y);
    rotate(r.rotation);
    tint(255, r.alpha);
    imageMode(CENTER);
    let w = r.img.width * r.scale;
    let h = r.img.height * r.scale;
    image(r.img, 0, 0, w, h);
    noTint();
    pop();
  }
}

let lastFireworkSoundTime = 0;

function triggerWatermelonCelebration(x, y) {
  let fw = (REWARDS_CONFIG && REWARDS_CONFIG.fireworks) || {};
  let particleCount = fw.particleCount || 30;
  let salvoDuration = fw.salvoDuration || 3000;
  let salvoInterval = fw.salvoInterval || 150;
  let spreadX = fw.spreadX || 60;
  let spreadY = fw.spreadY || 40;
  let playSound = fw.playSound !== false;
  let soundInterval = fw.soundInterval || 300;

  // Calculate number of bursts
  let burstCount = Math.floor(salvoDuration / salvoInterval);

  // Spawn fireworks in a continuous salvo across top half of screen
  for (let i = 0; i < burstCount; i++) {
    setTimeout(() => {
      // Random position in top half of screen
      let burstX = random(gameAreaLeft + 30, gameAreaRight - 30);
      let burstY = random(DANGER_LINE_Y + 20, canvasHeight * 0.5);
      spawnFireworks(burstX, burstY, particleCount);

      // Play firework sound (with throttling)
      if (playSound && millis() - lastFireworkSoundTime > soundInterval) {
        playFireworkSound();
        lastFireworkSoundTime = millis();
      }
    }, i * salvoInterval);
  }

  // Spawn floating reward image
  spawnFloatingReward(x, y);
}

function playFireworkSound() {
  if (!soundEnabled || allMuted) return;
  ensureAudioContext();
  if (!audioContext) return;

  // Create a firework pop/crackle sound
  let now = audioContext.currentTime;

  // Pop sound
  let osc = audioContext.createOscillator();
  let gain = audioContext.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(150 + Math.random() * 100, now);
  osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
  gain.gain.setValueAtTime(globalVolume * 0.3, now);
  gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
  osc.connect(gain);
  gain.connect(audioContext.destination);
  osc.start(now);
  osc.stop(now + 0.15);

  // Crackle/sparkle sound
  let noise = audioContext.createOscillator();
  let noiseGain = audioContext.createGain();
  noise.type = 'sawtooth';
  noise.frequency.setValueAtTime(800 + Math.random() * 400, now + 0.05);
  noise.frequency.exponentialRampToValueAtTime(200, now + 0.2);
  noiseGain.gain.setValueAtTime(globalVolume * 0.15, now + 0.05);
  noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
  noise.connect(noiseGain);
  noiseGain.connect(audioContext.destination);
  noise.start(now + 0.05);
  noise.stop(now + 0.25);
}

function clearAllFruits() {
  for (let fruit of fruits) {
    if (fruit) fruit.remove();
  }
  fruits = [];
  mergeQueue = [];

  // Recreate fruits group
  if (fruitsGroup) {
    fruitsGroup.removeAll();
  }
  fruitsGroup = new Group();
}

function cleanupFruits() {
  // Remove any fruits that somehow went off screen
  for (let i = fruits.length - 1; i >= 0; i--) {
    let fruit = fruits[i];
    if (fruit && (fruit.y > canvasHeight + 200 || fruit.x < -200 || fruit.x > canvasWidth + 200)) {
      removeFruit(fruit);
    }
  }
}

function drawDangerLine() {
  let flashRed = false;

  if (dangerActive) {
    let elapsed = millis() - dangerTimer;
    if (elapsed > DANGER_TIME - WARNING_TIME) {
      // Flash during last second
      flashRed = Math.floor(millis() / 100) % 2 === 0;
    }
  }

  stroke(flashRed ? UI_CONFIG.dangerLine.flashColor : UI_CONFIG.dangerLine.normalColor);
  strokeWeight(2);
  drawingContext.setLineDash([10, 10]);
  line(WALL_THICKNESS, DANGER_LINE_Y, canvasWidth - WALL_THICKNESS, DANGER_LINE_Y);
  drawingContext.setLineDash([]);

  // Danger label
  noStroke();
  fill(flashRed ? UI_CONFIG.dangerLine.flashColor : UI_CONFIG.dangerLine.normalColor);
  textAlign(LEFT, CENTER);
  textSize(12);
  text('DANGER', WALL_THICKNESS + 5, DANGER_LINE_Y - 12);

  // Show timer if danger active
  if (dangerActive) {
    let remaining = Math.max(0, DANGER_TIME - (millis() - dangerTimer)) / 1000;
    textAlign(RIGHT, CENTER);
    text(remaining.toFixed(1) + 's', canvasWidth - WALL_THICKNESS - 5, DANGER_LINE_Y - 12);
  }
}

function drawFruit(fruit) {
  let fruitData = FRUITS[fruit.fruitIndex];
  let img = fruitImages[fruitData.name];
  let radius = fruit.fruitRadius || fruitData.radius;
  let diameter = radius * 2;

  push();
  translate(fruit.x, fruit.y);
  rotate(fruit.rotation);

  if (img && img.width && img.height) {
    // Draw image clipped to circle
    drawingContext.save();
    drawingContext.beginPath();
    drawingContext.arc(0, 0, radius, 0, Math.PI * 2);
    drawingContext.closePath();
    drawingContext.clip();
    imageMode(CENTER);
    image(img, 0, 0, diameter, diameter);
    drawingContext.restore();
  } else {
    // Draw colored circle with label (fallback)
    fill(fruitData.color);
    noStroke();
    circle(0, 0, diameter);

    // Draw fruit display name, scaled to fit inside circle
    fill(255);
    textAlign(CENTER, CENTER);
    let maxTextWidth = diameter * 0.8;
    let fontSize = Math.min(radius * 0.5, 16);
    textSize(fontSize);

    // Use displayName if available, fallback to name
    let displayName = fruitData.displayName || fruitData.name;
    while (textWidth(displayName) > maxTextWidth && fontSize > 6) {
      fontSize -= 1;
      textSize(fontSize);
    }

    text(displayName, 0, 0);
  }

  pop();
}

function drawPreviewFruit() {
  let fruitData = FRUITS[currentFruitIndex];
  let alpha = canDrop ? 255 : 100;
  let radius = fruitData.radius * FRUIT_SCALE;
  let diameter = radius * 2;

  // Draw drop guide line
  stroke(UI_CONFIG.dropGuide.color);
  strokeWeight(1);
  drawingContext.setLineDash([5, 5]);
  line(previewX, DANGER_LINE_Y - 30, previewX, gameAreaBottom);
  drawingContext.setLineDash([]);

  // Draw preview fruit
  let img = fruitImages[fruitData.name];

  push();
  translate(previewX, DANGER_LINE_Y - 30 - radius);

  if (img && img.width && img.height) {
    // Draw image clipped to circle
    drawingContext.save();
    drawingContext.beginPath();
    drawingContext.arc(0, 0, radius, 0, Math.PI * 2);
    drawingContext.closePath();
    drawingContext.clip();
    tint(255, alpha);
    imageMode(CENTER);
    image(img, 0, 0, diameter, diameter);
    noTint();
    drawingContext.restore();
  } else {
    // Fallback to colored circle
    let c = color(fruitData.color);
    c.setAlpha(alpha);
    fill(c);
    noStroke();
    circle(0, 0, diameter);

    // Draw fruit display name
    fill(255, alpha);
    textAlign(CENTER, CENTER);
    let fontSize = Math.min(radius * 0.5, 16);
    textSize(fontSize);
    let maxTextWidth = diameter * 0.8;
    let displayName = fruitData.displayName || fruitData.name;
    while (textWidth(displayName) > maxTextWidth && fontSize > 6) {

      textSize(fontSize);
    }

  }

  pop();
}

  let boxH = 70;

  fill(UI_CONFIG.nextFruit.backgroundColor);
  stroke(UI_CONFIG.nextFruit.borderColor);
  strokeWeight(2);
  rect(boxX - boxW/2, boxY - boxH/2 + 5, boxW, boxH, 8);

  noStroke();
  fill(UI_CONFIG.nextFruit.labelColor);
  textAlign(CENTER, CENTER);
  textSize(10);
  text('NEXT', boxX, boxY - 18);

  // Draw preview of next fruit at a readable size
  let fruitData = FRUITS[nextFruitIndex];
  let img = fruitImages[fruitData.name];
  let displayRadius = Math.min(22, fruitData.radius * 0.6);
  let displayDiameter = displayRadius * 2;

  push();
  translate(boxX, boxY + 8);

  if (img && img.width && img.height) {
    // Draw image clipped to circle
    drawingContext.save();
    drawingContext.beginPath();
    drawingContext.arc(0, 0, displayRadius, 0, Math.PI * 2);
    drawingContext.closePath();
    drawingContext.clip();
    imageMode(CENTER);
    image(img, 0, 0, displayDiameter, displayDiameter);
    drawingContext.restore();
  } else {
    // Fallback: Draw colored circle with name
    fill(fruitData.color);
    noStroke();
    circle(0, 0, displayDiameter);

    // Draw fruit name inside
    fill(255);
    textAlign(CENTER, CENTER);
    let fontSize = Math.min(displayRadius * 0.5, 10);
    textSize(fontSize);
    let name = fruitData.name;
    let maxW = displayDiameter * 0.8;
    while (textWidth(name) > maxW && fontSize > 5) {
      fontSize -= 1;
      textSize(fontSize);
    }
    text(name, 0, 0);
  }

  pop();
}

// ============================================================================
// INPUT HANDLING
// ============================================================================

function mousePressed() {
  handleInput(mouseX, mouseY);
  return false; // Prevent default
}

function mouseClicked() {
  // Don't handle here - mousePressed already handles it
  // This prevents double-triggering buttons
  return false; // Prevent default
}

function mouseMoved() {
  if (gameState === 'playing') {
    let scaledRadius = FRUITS[currentFruitIndex].radius * FRUIT_SCALE;
    previewX = constrain(mouseX, gameAreaLeft + scaledRadius, gameAreaRight - scaledRadius);
  }
}

function touchStarted() {
  if (touches.length > 0) {
    handleInput(touches[0].x, touches[0].y);
  }
  return false; // Prevent default
}

function touchMoved() {
  if (gameState === 'playing' && touches.length > 0) {
    let scaledRadius = FRUITS[currentFruitIndex].radius * FRUIT_SCALE;
    previewX = constrain(touches[0].x, gameAreaLeft + scaledRadius, gameAreaRight - scaledRadius);
  }
  return false; // Prevent default
}

function keyPressed() {
  // Handle name input when overlay is open
  if (showNameInput) {
    handleNameInputKey(key);
    return false;
  }

  // Close leaderboard with Escape
  if (showLeaderboard && key === 'Escape') {
    closeLeaderboard();
    return false;
  }

  return true;
}

function handleInput(x, y) {
  // Start BGM on first user interaction (browser autoplay policy)
  startBgm();

  // Handle leaderboard overlays first (they're modal)
  if (handleNameInputClick(x, y)) return;
  if (handleLeaderboardClick(x, y)) return;

  // Handle mute button (available on all screens)
  if (handleMuteButtonClick(x, y)) return;

  switch (gameState) {
    case 'menu':
      handleMenuInput(x, y);
      break;
    case 'playing':
      handleGameInput(x, y);
      break;
    case 'win':
      handleWinInput(x, y);
      break;
    case 'lose':
      handleLoseInput(x, y);
      break;
  }
}

function handleMenuInput(x, y) {
  let btnX = canvasWidth / 2;

  // Check play button
  let playBtnY = canvasHeight * 0.68;
  let playBtnW = 160;
  let playBtnH = 50;

  if (isPointInRect(x, y, btnX - playBtnW/2, playBtnY - playBtnH/2, playBtnW, playBtnH)) {
    startGame('normal');
    return;
  }

  // Check leaderboard button
  let lbBtnY = canvasHeight * 0.77;
  let lbBtnW = 130;
  let lbBtnH = 35;

  if (isPointInRect(x, y, btnX - lbBtnW/2, lbBtnY - lbBtnH/2, lbBtnW, lbBtnH)) {
    openLeaderboard();
    return;
  }
}

function handleGameInput(x, y) {
  // Tap anywhere in the game area to drop at that x position
  if (x > gameAreaLeft && x < gameAreaRight && canDrop) {
    let scaledRadius = FRUITS[currentFruitIndex].radius * FRUIT_SCALE;
    previewX = constrain(x, gameAreaLeft + scaledRadius, gameAreaRight - scaledRadius);
    dropFruit();
  }
}

function handleWinInput(x, y) {
  let panelH = 380;
  let panelY = canvasHeight / 2 - panelH / 2 - 30;

  let btnX = canvasWidth / 2;
  let btn0Y = panelY + 225;  // Submit to Leaderboard
  let btn1Y = panelY + 275;  // Play Again
  let btn2Y = panelY + 322;  // Continue in Endless
  let linkY = panelY + 360;  // View Leaderboard
  let btnW = 180;
  let btnH = 38;

  // Submit to Leaderboard
  if (isPointInRect(x, y, btnX - btnW/2, btn0Y - btnH/2, btnW, btnH)) {
    promptNameInput(score);
    return;
  }

  // Play Again
  if (isPointInRect(x, y, btnX - btnW/2, btn1Y - btnH/2, btnW, btnH)) {
    startGame('normal');
    return;
  }

  // Continue in Endless
  if (isPointInRect(x, y, btnX - btnW/2, btn2Y - btnH/2, btnW, btnH)) {
    continueToEndless();
    return;
  }

  // View Leaderboard link
  if (isPointInRect(x, y, btnX - 60, linkY - 10, 120, 20)) {
    openLeaderboard();
    return;
  }
}

function handleLoseInput(x, y) {
  let panelW = 200;
  let panelH = canvasHeight * 0.68;
  let panelY = canvasHeight * 0.18;

  let btnX = canvasWidth / 2;
  let btn0Y = panelY + 170;  // Submit to Leaderboard
  let btn1Y = panelY + 220;  // Try Again
  let btn2Y = panelY + 268;  // Main Menu
  let linkY = panelY + panelH - 25;  // View Leaderboard
  let btnW = 170;
  let btnH = 38;

  // Submit to Leaderboard
  if (isPointInRect(x, y, btnX - btnW/2, btn0Y - btnH/2, btnW, btnH)) {
    promptNameInput(score);
    return;
  }

  // Try Again (restarts as Normal Mode)
  if (isPointInRect(x, y, btnX - btnW/2, btn1Y - btnH/2, btnW, btnH)) {
    startGame('normal');
    return;
  }

  // Main Menu
  if (isPointInRect(x, y, btnX - btnW/2, btn2Y - btnH/2, btnW, btnH)) {
    gameState = 'menu';
    clearAllFruits();
    // Remove walls too
    for (let wall of walls) {
      if (wall) wall.remove();
    }
    walls = [];
    return;
  }

  // View Leaderboard link
  if (isPointInRect(x, y, btnX - 60, linkY - 10, 120, 20)) {
    openLeaderboard();
    return;
  }
}

// ============================================================================
// SOUND FUNCTIONS (Web Audio API)
// ============================================================================

function initAudio() {
  // Create audio context on first user interaction (browser requirement)
  if (!audioContext) {
    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
      console.warn('Web Audio API not supported');
      soundEnabled = false;
      return;
    }
  }

  // Initialize background music from config
  if (!bgm && typeof SOUND_CONFIG !== 'undefined' && SOUND_CONFIG.bgm && SOUND_CONFIG.bgm.file) {
    bgm = new Audio(SOUND_CONFIG.bgm.file);
    bgm.loop = SOUND_CONFIG.bgm.loop !== false;
    bgm.volume = SOUND_CONFIG.bgm.volume !== undefined ? SOUND_CONFIG.bgm.volume : 0.5;
    bgm.onerror = () => {
      console.error('BGM failed to load:', SOUND_CONFIG.bgm.file);
      bgm = null;
    };
  }

  // Load sound files from config
  if (soundEnabled && typeof SOUND_CONFIG !== 'undefined' && SOUND_CONFIG.sounds) {
    for (let soundName in SOUND_CONFIG.sounds) {
      let soundData = SOUND_CONFIG.sounds[soundName];
      if (soundData.file) {
        loadAudioFile(soundName, soundData.file);
      }
    }
  }
}

function startBgm() {
  if (bgm && !bgmStarted) {
    bgm.play().then(() => {
      bgmStarted = true;
      console.log('BGM started');
    }).catch(e => {
      console.warn('BGM autoplay blocked, will retry on next interaction');
    });
  }
}

function toggleMute() {
  allMuted = !allMuted;
  if (bgm) {
    bgm.muted = allMuted;
  }
}

function drawMuteButton() {
  let btnSize = 36;
  let btnX = 10;
  let btnY = 10;
  let isHover = isMouseInRect(btnX, btnY, btnSize, btnSize);

  // Button background
  fill(isHover ? 'rgba(0,0,0,0.4)' : 'rgba(0,0,0,0.2)');
  noStroke();
  rect(btnX, btnY, btnSize, btnSize, 8);

  // Speaker icon
  fill(255);
  textAlign(CENTER, CENTER);
  textSize(20);

  if (allMuted) {
    text('🔇', btnX + btnSize/2, btnY + btnSize/2);
  } else {
    text('🔊', btnX + btnSize/2, btnY + btnSize/2);
  }
}

function handleMuteButtonClick(x, y) {
  let btnSize = 36;
  let btnX = 10;
  let btnY = 10;

  if (isPointInRect(x, y, btnX, btnY, btnSize, btnSize)) {
    toggleMute();
    return true;
  }
  return false;
}

function loadAudioFile(soundName, filePath) {
  fetch(filePath)
    .then(response => {
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${filePath}`);
      }
      return response.arrayBuffer();
    })
    .then(arrayBuffer => audioContext.decodeAudioData(arrayBuffer))
    .then(audioBuffer => {
      console.log('Sound loaded:', soundName);
      gameSounds[soundName] = audioBuffer;
    })
    .catch(e => {
      console.error('Failed to load sound "' + soundName + '" from ' + filePath + ':', e.message);
      console.log('Using placeholder sound for:', soundName);
      gameSounds[soundName] = null;
    });
}

function ensureAudioContext() {
  if (audioContext && audioContext.state === 'suspended') {
    audioContext.resume();
  }
  if (!audioContext) {
    initAudio();
  }
}

function playSound(soundName, pitchMultiplier = 1.0) {
  if (!soundEnabled || allMuted) return;

  ensureAudioContext();
  if (!audioContext) return;

  // Get individual volume from config
  let individualVolume = 1.0;
  if (typeof SOUND_CONFIG !== 'undefined' &&
      SOUND_CONFIG.sounds &&
      SOUND_CONFIG.sounds[soundName]) {
    individualVolume = SOUND_CONFIG.sounds[soundName].volume || 1.0;
  }

  let buffer = gameSounds[soundName];
  if (buffer) {
    // Play loaded sound file
    let source = audioContext.createBufferSource();
    let gainNode = audioContext.createGain();
    source.buffer = buffer;
    source.playbackRate.value = pitchMultiplier; // Adjust pitch
    gainNode.gain.value = globalVolume * individualVolume;
    source.connect(gainNode);
    gainNode.connect(audioContext.destination);
    source.start();
  } else {
    // Play procedural placeholder sound
    playPlaceholderSound(soundName, globalVolume * individualVolume, pitchMultiplier);
  }
}

function playPlaceholderSound(soundName, volume, pitchMultiplier = 1.0) {
  if (!audioContext) return;

  switch (soundName) {
    case 'spawn':
      playTone(300 * pitchMultiplier, 500 * pitchMultiplier, 0.1, volume * 0.4, 'sine');
      break;

    case 'merge':
      playTone(523 * pitchMultiplier, 523 * pitchMultiplier, 0.15, volume * 0.4, 'sine');
      setTimeout(() => playTone(659 * pitchMultiplier, 659 * pitchMultiplier, 0.15, volume * 0.4, 'sine'), 80);
      break;

    case 'victory':
      playVictoryFanfare(volume);
      break;

    case 'gameOver':
      playTone(400, 150, 0.5, volume * 0.3, 'sawtooth');
      break;
  }
}

function playTone(startFreq, endFreq, duration, volume, type) {
  let osc = audioContext.createOscillator();
  let gain = audioContext.createGain();

  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(startFreq, audioContext.currentTime);
  osc.frequency.linearRampToValueAtTime(endFreq, audioContext.currentTime + duration);

  gain.gain.setValueAtTime(volume, audioContext.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

  osc.connect(gain);
  gain.connect(audioContext.destination);

  osc.start();
  osc.stop(audioContext.currentTime + duration);
}

function playVictoryFanfare(volume) {
  let notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
  let delay = 0;

  for (let i = 0; i < notes.length; i++) {
    setTimeout(() => playTone(notes[i], notes[i], 0.2, volume * 0.3, 'sine'), delay);
    delay += 100;
  }

  // Final chord
  setTimeout(() => {
    for (let freq of notes) {
      playTone(freq, freq, 0.4, volume * 0.2, 'sine');
    }
  }, delay + 50);
}

// ============================================================================
// LEADERBOARD FUNCTIONS
// ============================================================================

// jsonbin.io API helpers
function getApiHeaders() {
  return {
    'Content-Type': 'application/json',
    'X-Master-Key': LEADERBOARD_CONFIG.apiKey
  };
}

async function fetchLeaderboard() {
  if (!LEADERBOARD_CONFIG || LEADERBOARD_CONFIG.apiKey === 'YOUR_API_KEY_HERE') {
    leaderboardError = 'API key not configured';
    return;
  }

  if (!LEADERBOARD_CONFIG.binId) {
    leaderboardData = [];
    leaderboardError = 'No leaderboard yet - submit a score to create one!';
    return;
  }

  leaderboardLoading = true;
  leaderboardError = null;

  try {
    let url = `${LEADERBOARD_CONFIG.baseUrl}/${LEADERBOARD_CONFIG.binId}/latest`;
    let response = await fetch(url, {
      method: 'GET',
      headers: getApiHeaders()
    });

    if (!response.ok) {
      throw new Error('Failed to fetch leaderboard');
    }

    let data = await response.json();

    // jsonbin returns { record: { leaderboard: [...] } }
    if (data.record && data.record.leaderboard) {
      leaderboardData = data.record.leaderboard;
      // Sort by score descending
      leaderboardData.sort((a, b) => b.score - a.score);
    } else {
      leaderboardData = [];
    }

    leaderboardLoading = false;
  } catch (e) {
    console.error('Leaderboard fetch error:', e);
    leaderboardError = 'Failed to load leaderboard';
    leaderboardLoading = false;
  }
}

async function createLeaderboardBin(initialData) {
  try {
    let response = await fetch(LEADERBOARD_CONFIG.baseUrl, {
      method: 'POST',
      headers: {
        ...getApiHeaders(),
        'X-Bin-Name': 'suika-leaderboard'
      },
      body: JSON.stringify(initialData)
    });

    if (!response.ok) {
      throw new Error('Failed to create leaderboard');
    }

    let data = await response.json();
    let binId = data.metadata.id;

    console.log('===========================================');
    console.log('LEADERBOARD CREATED! Copy this Bin ID:');
    console.log(binId);
    console.log('Paste it in leaderboard-config.js as binId');
    console.log('===========================================');

    // Store temporarily (won't persist on refresh until user updates config)
    LEADERBOARD_CONFIG.binId = binId;

    return binId;
  } catch (e) {
    console.error('Failed to create bin:', e);
    throw e;
  }
}

async function updateLeaderboardBin(leaderboard) {
  try {
    let url = `${LEADERBOARD_CONFIG.baseUrl}/${LEADERBOARD_CONFIG.binId}`;
    let response = await fetch(url, {
      method: 'PUT',
      headers: getApiHeaders(),
      body: JSON.stringify({ leaderboard: leaderboard })
    });

    if (!response.ok) {
      throw new Error('Failed to update leaderboard');
    }

    return true;
  } catch (e) {
    console.error('Failed to update bin:', e);
    throw e;
  }
}

async function submitScore(playerName, playerScore) {
  if (!LEADERBOARD_CONFIG || LEADERBOARD_CONFIG.apiKey === 'YOUR_API_KEY_HERE') {
    leaderboardError = 'API key not configured';
    return false;
  }

  submitting = true;
  leaderboardError = null;

  try {
    let dateStr = new Date().toISOString().slice(0, 16).replace('T', ' ');

    let newEntry = {
      name: playerName.toUpperCase(),
      score: playerScore,
      date: dateStr
    };

    // If no bin exists yet, create one
    if (!LEADERBOARD_CONFIG.binId) {
      await createLeaderboardBin({ leaderboard: [newEntry] });
      leaderboardData = [newEntry];
      submitting = false;
      return true;
    }

    // Fetch current leaderboard
    await fetchLeaderboard();

    // Add new entry
    let updatedLeaderboard = [...leaderboardData, newEntry];

    // Sort by score descending
    updatedLeaderboard.sort((a, b) => b.score - a.score);

    // Keep only top entries
    updatedLeaderboard = updatedLeaderboard.slice(0, LEADERBOARD_CONFIG.maxEntries);

    // Update bin
    await updateLeaderboardBin(updatedLeaderboard);

    leaderboardData = updatedLeaderboard;
    submitting = false;
    return true;
  } catch (e) {
    console.error('Score submission error:', e);
    leaderboardError = 'Failed to submit score';
    submitting = false;
    return false;
  }
}

async function clearLeaderboard() {
  if (!LEADERBOARD_CONFIG || LEADERBOARD_CONFIG.apiKey === 'YOUR_API_KEY_HERE') {
    leaderboardError = 'API key not configured';
    return false;
  }

  if (!LEADERBOARD_CONFIG.binId) {
    leaderboardData = [];
    return true;
  }

  try {
    await updateLeaderboardBin([]);
    leaderboardData = [];
    return true;
  } catch (e) {
    console.error('Clear leaderboard error:', e);
    leaderboardError = 'Failed to clear leaderboard';
    return false;
  }
}

async function deleteLeaderboardEntry(playerName) {
  if (!LEADERBOARD_CONFIG || LEADERBOARD_CONFIG.apiKey === 'YOUR_API_KEY_HERE') {
    leaderboardError = 'API key not configured';
    return false;
  }

  try {
    // Filter out the entry
    let updatedLeaderboard = leaderboardData.filter(e => e.name !== playerName);

    await updateLeaderboardBin(updatedLeaderboard);
    leaderboardData = updatedLeaderboard;
    return true;
  } catch (e) {
    console.error('Delete entry error:', e);
    leaderboardError = 'Failed to delete entry';
    return false;
  }
}

function promptNameInput(scoreValue, callback) {
  playerNameInput = '';
  scoreToSubmit = scoreValue;
  nameInputCallback = callback;
  showNameInput = true;
}

function closeNameInput() {
  showNameInput = false;
  playerNameInput = '';
  nameInputCallback = null;
}

function openLeaderboard() {
  showLeaderboard = true;
  leaderboardScrollOffset = 0;
  fetchLeaderboard();
}

function closeLeaderboard() {
  showLeaderboard = false;
}

// ============================================================================
// LEADERBOARD UI DRAWING
// ============================================================================

function drawNameInputOverlay() {
  if (!showNameInput) return;

  let ui = LEADERBOARD_CONFIG.ui;

  // Darken background
  fill(0, 0, 0, 180);
  rect(0, 0, canvasWidth, canvasHeight);

  // Input panel
  let panelW = 240;
  let panelH = 220;
  let panelX = canvasWidth / 2 - panelW / 2;
  let panelY = canvasHeight / 2 - panelH / 2;

  fill(ui.panelColor);
  noStroke();
  rect(panelX, panelY, panelW, panelH, 15);

  // Title
  fill(ui.titleColor);
  textAlign(CENTER, CENTER);
  textSize(22);
  text('SUBMIT SCORE', canvasWidth / 2, panelY + 30);

  // Score display
  fill(ui.textColor);
  textSize(18);
  text('Score: ' + scoreToSubmit, canvasWidth / 2, panelY + 60);

  // Instructions
  textSize(14);
  text('Enter your name:', canvasWidth / 2, panelY + 95);

  // Name input box
  let inputW = 180;
  let inputH = 50;
  let inputX = canvasWidth / 2 - inputW / 2;
  let inputY = panelY + 110;

  fill(ui.inputBackgroundColor);
  stroke(ui.inputBorderColor);
  strokeWeight(2);
  rect(inputX, inputY, inputW, inputH, 8);

  // Display entered letters
  noStroke();
  fill(ui.titleColor);
  textSize(28);
  textStyle(BOLD);

  // Show letters with underscores for empty slots
  let maxLen = LEADERBOARD_CONFIG.maxNameLength;
  let displayName = playerNameInput.padEnd(maxLen, '_');
  let letterSpacing = 30;
  let startX = canvasWidth / 2 - (letterSpacing * (maxLen - 1)) / 2;

  for (let i = 0; i < maxLen; i++) {
    let char = displayName[i];
    let x = startX + i * letterSpacing;
    text(char, x, inputY + inputH / 2);
  }
  textStyle(NORMAL);

  // Submit button (only if enough letters entered)
  let btnY = panelY + 175;
  let btnW = 100;
  let btnH = 35;
  let btnX = canvasWidth / 2 - btnW / 2;

  if (playerNameInput.length >= 1) {
    let hoverSubmit = isMouseInRect(btnX, btnY, btnW, btnH);
    fill(hoverSubmit ? ui.buttonHover : ui.buttonNormal);
    noStroke();
    rect(btnX, btnY, btnW, btnH, 8);

    fill(ui.buttonText);
    textSize(16);
    text(submitting ? 'Sending...' : 'Submit', canvasWidth / 2, btnY + btnH / 2);
  } else {
    // Disabled button
    fill(150);
    noStroke();
    rect(btnX, btnY, btnW, btnH, 8);

    fill(100);
    textSize(16);
    text('Submit', canvasWidth / 2, btnY + btnH / 2);
  }

  // Cancel button (X in corner)
  let closeX = panelX + panelW - 25;
  let closeY = panelY + 10;
  let closeSize = 20;

  let hoverClose = isMouseInRect(closeX, closeY, closeSize, closeSize);
  fill(hoverClose ? '#E74C3C' : '#999');
  textSize(20);
  text('X', closeX + closeSize / 2, closeY + closeSize / 2);

  // Error message
  if (leaderboardError) {
    fill(ui.errorColor);
    textSize(12);
    text(leaderboardError, canvasWidth / 2, panelY + panelH - 10);
  }
}

function drawLeaderboardScreen() {
  if (!showLeaderboard) return;

  let ui = LEADERBOARD_CONFIG.ui;

  // Full screen overlay
  fill(0, 0, 0, 200);
  rect(0, 0, canvasWidth, canvasHeight);

  // Leaderboard panel
  let panelW = canvasWidth - 40;
  let panelH = canvasHeight - 80;
  let panelX = 20;
  let panelY = 40;

  fill(ui.panelColor);
  noStroke();
  rect(panelX, panelY, panelW, panelH, 15);

  // Title
  fill(ui.titleColor);
  textAlign(CENTER, CENTER);
  textSize(28);
  text('LEADERBOARD', canvasWidth / 2, panelY + 35);

  // Close button (X)
  let closeX = panelX + panelW - 35;
  let closeY = panelY + 10;
  let closeSize = 25;

  let hoverClose = isMouseInRect(closeX, closeY, closeSize, closeSize);
  fill(hoverClose ? '#E74C3C' : '#999');
  textSize(24);
  text('X', closeX + closeSize / 2, closeY + closeSize / 2);

  // Loading state
  if (leaderboardLoading) {
    fill(ui.textColor);
    textSize(18);
    text('Loading...', canvasWidth / 2, canvasHeight / 2);
    return;
  }

  // Error state
  if (leaderboardError) {
    fill(ui.errorColor);
    textSize(16);
    text(leaderboardError, canvasWidth / 2, canvasHeight / 2);
    return;
  }

  // Empty state
  if (leaderboardData.length === 0) {
    fill(ui.textColor);
    textSize(16);
    text('No scores yet!', canvasWidth / 2, canvasHeight / 2);
    text('Be the first to submit!', canvasWidth / 2, canvasHeight / 2 + 25);
    return;
  }

  // Column headers
  let headerY = panelY + 70;
  fill(ui.headerColor);
  textSize(14);
  textStyle(BOLD);

  textAlign(CENTER, CENTER);
  text('#', panelX + 30, headerY);
  textAlign(LEFT, CENTER);
  text('NAME', panelX + 55, headerY);
  textAlign(RIGHT, CENTER);
  text('SCORE', panelX + panelW - 20, headerY);
  textStyle(NORMAL);

  // Divider line
  stroke(ui.inputBorderColor);
  strokeWeight(1);
  line(panelX + 15, headerY + 15, panelX + panelW - 15, headerY + 15);
  noStroke();

  // Leaderboard entries
  let entryStartY = headerY + 35;
  let entryHeight = 40;
  let maxVisible = Math.floor((panelH - 140) / entryHeight);

  for (let i = 0; i < Math.min(leaderboardData.length, maxVisible); i++) {
    let entry = leaderboardData[i + leaderboardScrollOffset];
    if (!entry) continue;

    let y = entryStartY + i * entryHeight;

    // Highlight top 3
    if (i + leaderboardScrollOffset < 3) {
      let medals = ['#FFD700', '#C0C0C0', '#CD7F32']; // Gold, Silver, Bronze
      fill(medals[i + leaderboardScrollOffset]);
      circle(panelX + 30, y - 3, 20);
      fill('#FFF');
      textSize(12);
      textAlign(CENTER, CENTER);
      text(i + leaderboardScrollOffset + 1, panelX + 30, y - 3);
    } else {
      fill(ui.textColor);
      textSize(14);
      textAlign(CENTER, CENTER);
      text(i + leaderboardScrollOffset + 1, panelX + 30, y - 3);
    }

    // Name
    fill(ui.textColor);
    textSize(16);
    textAlign(LEFT, CENTER);
    text(entry.name || '???', panelX + 55, y - 5);

    // Date (below name)
    textSize(9);
    fill('#999');
    text(entry.date || '', panelX + 55, y + 10);

    // Score
    fill(ui.textColor);
    textSize(18);
    textAlign(RIGHT, CENTER);
    textStyle(BOLD);
    text(entry.score || 0, panelX + panelW - 20, y);
    textStyle(NORMAL);
  }

}

// ============================================================================
// LEADERBOARD INPUT HANDLING
// ============================================================================

function handleNameInputClick(x, y) {
  if (!showNameInput) return false;

  let ui = LEADERBOARD_CONFIG.ui;
  let panelW = 240;
  let panelH = 220;
  let panelX = canvasWidth / 2 - panelW / 2;
  let panelY = canvasHeight / 2 - panelH / 2;

  // Close button
  let closeX = panelX + panelW - 25;
  let closeY = panelY + 10;
  if (isPointInRect(x, y, closeX, closeY, 20, 20)) {
    closeNameInput();
    return true;
  }

  // Submit button
  if (playerNameInput.length >= 1 && !submitting) {
    let btnY = panelY + 175;
    let btnW = 100;
    let btnH = 35;
    let btnX = canvasWidth / 2 - btnW / 2;

    if (isPointInRect(x, y, btnX, btnY, btnW, btnH)) {
      submitScore(playerNameInput.toUpperCase(), scoreToSubmit).then(success => {
        if (success) {
          closeNameInput();
          openLeaderboard();
        }
      });
      return true;
    }
  }

  return true; // Consume click (modal)
}

function handleLeaderboardClick(x, y) {
  if (!showLeaderboard) return false;

  let panelW = canvasWidth - 40;
  let panelH = canvasHeight - 80;
  let panelX = 20;
  let panelY = 40;

  // Close button
  let closeX = panelX + panelW - 35;
  let closeY = panelY + 10;
  if (isPointInRect(x, y, closeX, closeY, 25, 25)) {
    closeLeaderboard();
    return true;
  }

  return true; // Consume click (modal)
}

function handleNameInputKey(key) {
  if (!showNameInput) return false;

  // Handle backspace
  if (key === 'Backspace' && playerNameInput.length > 0) {
    playerNameInput = playerNameInput.slice(0, -1);
    return true;
  }

  // Handle Enter (submit if ready)
  if (key === 'Enter' && playerNameInput.length >= 1 && !submitting) {
    submitScore(playerNameInput.toUpperCase(), scoreToSubmit).then(success => {
      if (success) {
        closeNameInput();
        openLeaderboard();
      }
    });
    return true;
  }

  // Handle Escape (cancel)
  if (key === 'Escape') {
    closeNameInput();
    return true;
  }

  // Handle letter input (A-Z only)
  let maxLen = LEADERBOARD_CONFIG.maxNameLength;
  if (playerNameInput.length < maxLen && key.length === 1 && /^[a-zA-Z]$/.test(key)) {
    playerNameInput += key.toUpperCase();
    return true;
  }

  return true; // Consume all keys when input is open
}

// ============================================================================
// UTILITY FUNCTIONS
// ============================================================================

function isPointInRect(px, py, rx, ry, rw, rh) {
  return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
}

function isMouseInRect(rx, ry, rw, rh) {
  return isPointInRect(mouseX, mouseY, rx, ry, rw, rh);
}

function loadHighScore() {
  try {
    let saved = localStorage.getItem('fruitDropHighScore');
    highScore = saved ? parseInt(saved) : 0;
  } catch (e) {
    highScore = 0;
  }
}

function updateHighScore() {
  if (score > highScore) {
    highScore = score;
    try {
      localStorage.setItem('fruitDropHighScore', highScore.toString());
    } catch (e) {
      // localStorage not available
    }
  }
}
